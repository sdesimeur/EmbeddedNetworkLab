<div class="shell">
  <nav class="sidebar">
    <div class="logo">
      <span class="logo-icon">⚙</span>
      <span class="logo-text">EmbeddedNetworkLab</span>
    </div>
    <ul class="nav-list">
      @for (item of navItems; track item.route) {
        <li>
          <a class="nav-item"
             [routerLink]="item.route"
             routerLinkActive="active">
            <span class="nav-icon">{{ item.icon }}</span>
            <span>{{ item.label }}</span>
          </a>
        </li>
      }
    </ul>
  </nav>

  <div class="main-area">
    <main class="content">
      <router-outlet />
    </main>

    <!-- CONSOLE -->
    <div class="console-panel" [class.collapsed]="consoleCollapsed">
      <div class="console-header">
        <span class="console-title">Console</span>
        <div class="console-actions">
          <button class="console-btn" (click)="clearConsole()" title="Clear">✕</button>
          <button class="console-btn" (click)="toggleConsole()" title="Toggle">
            {{ consoleCollapsed ? '▲' : '▼' }}
          </button>
        </div>
      </div>
      @if (!consoleCollapsed) {
        <div class="console-body" #consoleBody>
          @for (line of consoleLines$ | async; track $index) {
            <div class="console-line">
              <span class="console-ts">[{{ line.timestamp }}]</span>
              <span class="console-mod">[{{ line.module }}]</span>
              <span class="console-msg">{{ line.message }}</span>
            </div>
          }
        </div>
      }
    </div>
  </div>
</div>
